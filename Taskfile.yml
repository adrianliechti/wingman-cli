# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  ui:
    desc: Build the web UI assets
    dir: server/ui
    cmds:
      - npm install
      - npm run build

  server:
    desc: Run the server
    deps: [ui]
    cmds:
      - go run . server

  agent:
    desc: Run the agent TUI
    cmds:
      - go run .

  install:
    desc: Install wingman to GOPATH/bin
    deps: [ui]
    cmds:
      - go install .

  app:
    desc: Build and launch the Wails desktop app
    deps: [ui]
    dir: app
    cmds:
      - wails build
      - open "build/bin/Wingman Agent.app"
